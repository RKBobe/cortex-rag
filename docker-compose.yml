version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cortex_backend
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/app/chroma_db
      - ./data:/app/data
    environment:
      - CORTEX_DATA_ROOT=/app/data
      - CHROMA_DB_PATH=/app/chroma_db
      - TEMP_BASE_DIR=/app/data/temp_repos
      - REGISTRY_FILE=/app/data/repo_registry.json
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop asyncio
    restart: always

  frontend:
    build: ./frontend
    container_name: cortex_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always